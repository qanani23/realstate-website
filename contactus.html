<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="./ax.css">
    <link rel="stylesheet" href="./contact.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

    <header class="page-header">
        <nav class="navbar">
            <div class="nav-links">
                <a href="homepage.html">Home</a>
                <a href="mainpage.html">Main Page</a>
                <a href="aboutus.html">About Us</a>
            </div>
        </nav>
    </header>

    <main class="contact-page">
        <section class="contact-container">
            <div class="contact-info">
                <h1>Contact The Abbay Key</h1>
                <p>We’re here to help you find your dream property. Reach out to us anytime!</p>
                <div class="info-item">
                    <span>📍</span>
                    <p>Bole, Addis Ababa, Ethiopia</p>
                </div>
                <div class="info-item">
                    <span>📞</span>
                    <p>+251 987 654 321</p>
                </div>
                <div class="info-item">
                    <span>✉️</span>
                    <p>support@theAbbayKey.com</p>
                </div>
                <div class="info-item">
                    <span>🕒</span>
                    <p>Mon - Sun: 8:00 AM – 8:00 PM</p>
                </div>
            </div>

            <div class="contact-form">
                <h2>Send Us a Message</h2>
                <form id="contactForm">
                    <input type="text" placeholder="Full Name" required>
                    <input type="email" placeholder="Email Address" required>
                    <input type="text" placeholder="Phone Number">
                    <textarea placeholder="Your Message..." required></textarea>
                    <button type="submit">Send Message</button>
                </form>
            </div>
        </section>

        <section class="map-section">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3960.123456789012!2d38.8100855!3d8.9831138!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x164b8a0b6f0b1234%3A0xabcdef0123456789!2sBole%2C%20Addis%20Ababa%2C%20Ethiopia!5e0!3m2!1sen!2set!4v1700000000000"
                allowfullscreen=""
                loading="lazy"></iframe>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-buttons">
                <button class="footer-btn" onclick="window.location.href='thermsofuse.html'">Terms of Use</button>
                <button class="footer-btn" onclick="window.location.href='privacy.html'">Privacy Policy</button>
                <button class="footer-btn" onclick="window.location.href='contactus.html'">Contact Us</button>
                <button class="footer-btn" onclick="scrollToTop()">Back to Top</button>
            </div>
            <div class="social-icons">
                <a href="https://twitter.com" class="icon-link"><i class="fab fa-twitter"></i></a>
                <a href="https://www.youtube.com" class="icon-link"><i class="fab fa-youtube"></i></a>
                <a href="https://www.facebook.com" class="icon-link"><i class="fab fa-facebook-f"></i></a>
                <a href="https://t.me/s/fa-telegram-plane" class="icon-link"><i class="fab fa-telegram-plane"></i></a>
                <a href="https://t.me/s/fa-linkedin-in" class="icon-link"><i class="fab fa-linkedin-in"></i></a>
                <a href="https://www.tiktok.com/" class="icon-link"><i class="fab fa-tiktok"></i></a>
                <a href="https://www.instagram.com" class="icon-link"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </footer>

    <script>
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        
        const form = document.getElementById('contactForm');
        form.addEventListener('submit', function(e) {
            e.preventDefault(); 
            alert('Message successfully sent!');
            form.reset(); 
        });
    </script>

</body>
</html>
